# This is a basic workflow to help you get started with Actions

name: Deploy Cfn Stacks

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read  # Required to check out the repository
      
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::912333642649:role/githubRole
          aws-region: us-east-1 
          
      # Runs a single command using the runners shell
      - run: |
          echo "Triggering AWS Pipeline"
          if [[ ${{ github.event_name }} == 'pull_request' ]]; then
            changed_files=$(git diff --name-only -r HEAD^1 HEAD)
          else
            changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          fi
          echo "$changed_files"
          aws codepipeline start-pipeline-execution --files GithubPipeline --variables '[{"name":"changedfiles", "value":"$changed_files"}]' 
